<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Botanical Example | Frontend Slides</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Sans:wght@300;400&display=swap" rel="stylesheet">
    <style>
        /* ===========================================
           VIEWPORT FITTING: MANDATORY
           =========================================== */
        html, body {
            height: 100%;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }
        html {
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }
        .slide {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .slide-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            max-height: 100%;
            overflow: hidden;
            padding: var(--slide-padding);
            text-align: center;
        }

        /* ===========================================
           THEME: DARK BOTANICAL
           =========================================== */
        :root {
            --bg-primary: #0f0f0f;
            --text-primary: #e8e4df;
            --text-secondary: #9a9590;
            --accent: #d4a574;
            
            --font-display: 'Cormorant', serif;
            --font-body: 'IBM Plex Sans', sans-serif;
            
            --title-size: clamp(2.5rem, 8vw, 6rem);
            --body-size: clamp(0.9rem, 1.5vw, 1.25rem);
            --slide-padding: clamp(2rem, 5vw, 6rem);
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        /* Abstract shapes */
        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.4;
        }

        .shape-1 {
            width: 40vw;
            height: 40vw;
            background: #d4a574;
            top: -10vw;
            right: -10vw;
        }

        .shape-2 {
            width: 30vw;
            height: 30vw;
            background: #e8b4b8;
            bottom: -5vw;
            left: -5vw;
        }

        h1 {
            font-family: var(--font-display);
            font-size: var(--title-size);
            font-weight: 400;
            line-height: 1;
            margin: 0;
            position: relative;
            z-index: 1;
        }

        .subtitle {
            font-size: var(--body-size);
            color: var(--text-secondary);
            margin-top: 2rem;
            max-width: 500px;
            position: relative;
            z-index: 1;
            letter-spacing: 0.05em;
        }

        .accent-line {
            width: 1px;
            height: 100px;
            background: var(--accent);
            margin-bottom: 2rem;
            position: relative;
            z-index: 1;
        }

        /* Animations */
        .reveal {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1.5s ease, transform 1.5s ease;
        }

        .visible .reveal {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <section class="slide visible">
        <div class="slide-content">
            <div class="accent-line reveal"></div>
            <h1 class="reveal">Dark<br>Botanical</h1>
            <p class="subtitle reveal" style="transition-delay: 0.5s;">Sophisticated, organic, and premium aesthetic for refined storytelling.</p>
        </div>
    </section>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.5 });

        document.querySelectorAll('.slide').forEach(slide => {
            observer.observe(slide);
        });
    </script>
</body>
</html>

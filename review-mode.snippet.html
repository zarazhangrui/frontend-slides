<!-- ============================================================
     SIMPLE REVIEW MODE - 右侧边栏版本
     按 Ctrl+R 打开/关闭评论侧边栏，adaptive 响应式设计
     ============================================================ -->

<style id="__simple-review-styles">
/* ========================================
   Push 模式 - 覆盖 .slide 宽度
   只在侧边栏打开时生效，关闭后自动回归
   ======================================== */

/* 桌面：侧边栏 400px */
html.__sr-pushed .slide{width:calc(100vw - 400px) !important;min-width:calc(100vw - 400px) !important}

/* 平板：侧边栏 350px */
@media(max-width:1200px){
  html.__sr-pushed .slide{width:calc(100vw - 350px) !important;min-width:calc(100vw - 350px) !important}
}

/* 小屏幕：侧边栏 80vw */
@media(max-width:768px){
  html.__sr-pushed .slide{width:20vw !important;min-width:20vw !important}
}

/* 移动端：不推挤，侧边栏覆盖 */
@media(max-width:480px){
  html.__sr-pushed .slide{width:100vw !important;min-width:100vw !important}
}

/* Review 按钮 */
#__srb{position:fixed;top:16px;left:16px;z-index:9000;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(8px);border-radius:8px;padding:8px 12px;font-size:12px;color:rgba(255,255,255,.5);cursor:pointer;font-family:ui-sans-serif,sans-serif;transition:all .2s;user-select:none}
#__srb:hover{color:rgba(255,255,255,.9);border-color:rgba(255,255,255,.3)}

/* 侧边栏面板 - 默认桌面布局 */
#__srp{position:fixed;top:0;right:0;bottom:0;width:400px;background:#1a1a1a;border-left:2px solid #4361ee;transform:translateX(100%);transition:transform .3s ease;z-index:9500;display:flex;flex-direction:column}
#__srp.open{transform:translateX(0)}

/* 平板适配 */
@media(max-width:1200px){
  #__srp{width:350px}
}

/* 小屏幕适配 - 侧边栏占据更多空间 */
@media(max-width:768px){
  #__srp{width:80vw;max-width:400px}
}

/* 超小屏幕适配 - 全屏显示 */
@media(max-width:480px){
  #__srp{width:100vw;max-width:100vw;border-left:none;border-top:2px solid #4361ee}
}

/* 面板头部 */
.__srh{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.__srt{font-size:14px;font-weight:600;color:#e8e8e8}
.__src{font-size:11px;color:#888;margin-left:8px}
.__srx{background:transparent;border:none;color:#888;cursor:pointer;font-size:18px;padding:4px 8px;transition:color .2s;line-height:1}
.__srx:hover{color:#fff}

/* 输入区 */
.__sri{padding:16px;border-bottom:1px solid rgba(255,255,255,.1);flex-shrink:0}
.__sri textarea{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.15);border-radius:6px;color:#e8e8e8;font-size:13px;font-family:ui-sans-serif,sans-serif;padding:12px;resize:vertical;outline:none;min-height:100px;max-height:300px}
.__sri textarea:focus{border-color:#4361ee;background:rgba(255,255,255,.08)}
.__sri textarea::placeholder{color:#666}
.__sra{display:flex;gap:8px;margin-top:8px;justify-content:flex-end}
.__srb2{padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-family:inherit;transition:all .2s}
.__srb2.clear{background:transparent;color:#888;border:1px solid rgba(255,255,255,.1)}
.__srb2.clear:hover{color:#fff;border-color:rgba(255,255,255,.2)}
.__srb2.save{background:#4361ee;color:#fff;font-weight:500}
.__srb2.save:hover{background:#3651de}
.__srb2:disabled{opacity:.4;cursor:not-allowed}

/* 评论列表 */
.__srl{flex:1;overflow-y:auto;padding:12px 16px}
.__srl::-webkit-scrollbar{width:8px}
.__srl::-webkit-scrollbar-track{background:rgba(255,255,255,.05)}
.__srl::-webkit-scrollbar-thumb{background:#333;border-radius:4px}
.__srl::-webkit-scrollbar-thumb:hover{background:#444}
.__sre{padding:3rem 1rem;text-align:center;color:#555;font-size:13px;line-height:1.6}
.__srcom{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:12px;margin-bottom:12px;position:relative}
.__srcom:hover{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.12)}
.__srm{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.__srn{background:#4361ee;color:#fff;border-radius:4px;padding:3px 8px;font-size:11px;font-weight:600;font-family:ui-monospace,monospace}
.__srs{color:#888;font-size:11px}
.__srd{background:transparent;border:none;color:#666;cursor:pointer;font-size:14px;padding:4px;position:absolute;top:8px;right:8px;opacity:0;transition:all .2s;line-height:1}
.__srcom:hover .__srd{opacity:1}
.__srd:hover{color:#ef4444}
.__srtxt{color:#ccc;font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word}

/* 底部操作栏 */
.__srf{padding:12px 16px;border-top:1px solid rgba(255,255,255,.1);display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.__srfc{font-size:12px;color:#888;text-align:center}
.__srexp{background:rgba(67,97,238,.15);border:1px solid #4361ee;color:#a5b4fc;padding:10px 16px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;transition:all .2s;width:100%;text-align:center}
.__srexp:hover{background:rgba(67,97,238,.25);color:#c7d2fe}
.__srexp:disabled{opacity:.3;cursor:not-allowed}

/* 当前页指示器 */
#__srs{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(67,97,238,.9);color:#fff;padding:8px 20px;border-radius:20px;font-size:12px;font-weight:500;opacity:0;pointer-events:none;transition:opacity .3s;z-index:9999;font-family:ui-monospace,monospace;box-shadow:0 4px 12px rgba(0,0,0,.3)}
#__srs.show{opacity:1}

/* 选区框 */
#__srsel{position:fixed;border:2px dashed #4361ee;background:rgba(67,97,238,.15);pointer-events:none;z-index:9400;display:none}
#__srsel.active{display:block}

/* 元素高亮（悬停时） */
.__sr-highlight{outline:2px solid #4361ee !important;outline-offset:2px;cursor:pointer !important}

/* 评论区域高亮框容器 */
#__srhlt{position:fixed;top:0;left:0;pointer-events:none;z-index:9300}
.__srhlt-box{position:fixed;border:3px solid #f59e0b;background:rgba(245,158,11,.15);pointer-events:none;border-radius:4px}
.__srhlt-box::before{content:attr(data-id);position:absolute;top:-20px;left:0;background:#f59e0b;color:#000;font-size:10px;font-weight:bold;padding:2px 6px;border-radius:3px;font-family:ui-monospace,monospace}
.__srhlt-box.flash{animation:__sr-pulse 1s ease-in-out 3}
@keyframes __sr-pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.02)}}

/* 可点击的评论 */
.__srcom.clickable{cursor:pointer}
.__srcom.clickable:hover{border-color:#f59e0b}
.__srcom.selected{border-color:#f59e0b;background:rgba(245,158,11,.1)}

/* 小屏幕上的按钮适配 */
@media(max-width:480px){
  #__srb{font-size:11px;padding:6px 10px}
  .__srb2{font-size:11px;padding:6px 12px}
}
</style>

<div id="__srb" title="Ctrl+R — 打开评论侧边栏">✎ Review (Ctrl+R)</div>

<div id="__srp">
  <div class="__srh">
    <div>
      <span class="__srt">当前页评论</span>
      <span class="__src" id="__src">Slide #1</span>
    </div>
    <button class="__srx" id="__srx" title="关闭侧边栏 (Esc)">✕</button>
  </div>

  <div class="__sri">
    <textarea id="__srta" placeholder="在此输入对当前页的修改建议...&#10;&#10;例如：&#10;• 标题字体太小，建议改为 48px&#10;• 第二段内容需要补充数据来源&#10;• 配色建议调整为更柔和的蓝色"></textarea>
    <div class="__sra">
      <button class="__srb2 clear" id="__srcl">清除</button>
      <button class="__srb2 save" id="__srsv">保存到当前页</button>
    </div>
  </div>

  <div class="__srl" id="__srl">
    <div class="__sre" id="__sre">当前页还没有评论<br><br>💡 输入修改建议后点击"保存"<br>评论会自动关联到当前幻灯片</div>
  </div>

  <div class="__srf">
    <button class="__srexp" id="__srexp" disabled>📥 导出全部评论 (Markdown)</button>
    <span class="__srfc" id="__srfc">总共 0 条评论</span>
  </div>
</div>

<div id="__srs"></div>
<div id="__srsel"></div>
<div id="__srhlt"></div>

<script>
(function(){
  var state={
    comments:{}, // {slideIndex: [{id, text, timestamp}]}
    currentSlide:0,
    nextId:1,
    panelOpen:false
  };

  var badge=document.getElementById('__srb');
  var panel=document.getElementById('__srp');
  var closebtn=document.getElementById('__srx');
  var slideLabel=document.getElementById('__src');
  var textarea=document.getElementById('__srta');
  var clearBtn=document.getElementById('__srcl');
  var saveBtn=document.getElementById('__srsv');
  var list=document.getElementById('__srl');
  var empty=document.getElementById('__sre');
  var countLabel=document.getElementById('__srfc');
  var exportBtn=document.getElementById('__srexp');
  var slideIndicator=document.getElementById('__srs');
  var selectionBox=document.getElementById('__srsel');
  var highlightBox=document.getElementById('__srhlt');

  // 选区/元素选择状态
  var selState={
    dragging:false,
    startX:0,
    startY:0,
    lastHighlight:null
  };

  // 使用 IntersectionObserver 检测当前幻灯片
  function setupSlideDetection(){
    var slides=document.querySelectorAll('.slide');
    if(slides.length===0){
      console.warn('Review mode: 未找到 .slide 元素');
      return;
    }

    var observer=new IntersectionObserver(function(entries){
      entries.forEach(function(entry){
        // 当幻灯片至少有 50% 可见时，认为它是当前幻灯片
        if(entry.isIntersecting && entry.intersectionRatio>=0.5){
          var slideIdx=Array.from(slides).indexOf(entry.target);
          if(slideIdx!==-1 && slideIdx!==state.currentSlide){
            state.currentSlide=slideIdx;
            slideLabel.textContent='Slide #'+(slideIdx+1);
            renderComments();
            if(state.panelOpen){
              showSlideIndicator();
            }
          }
        }
      });
    },{
      threshold:[0,0.5,1], // 在 0%, 50%, 100% 可见时触发
      rootMargin:'0px'
    });

    slides.forEach(function(slide){
      observer.observe(slide);
    });
  }

  // 显示页码指示器
  function showSlideIndicator(){
    slideIndicator.textContent='📍 Slide '+(state.currentSlide+1);
    slideIndicator.classList.add('show');
    setTimeout(function(){slideIndicator.classList.remove('show');},1800);
  }

  // 切换面板
  function togglePanel(){
    state.panelOpen=!state.panelOpen;
    panel.classList.toggle('open',state.panelOpen);
    document.documentElement.classList.toggle('__sr-pushed',state.panelOpen);
    if(state.panelOpen){
      textarea.focus();
      showSlideIndicator();
    }else{
      hideAllHighlights();
      clearSelectedComment();
    }
  }

  // 解析单行位置信息
  function parseSingleLocation(line){
    if(!line.startsWith('📍'))return null;

    // 解析区域: 📍 [Slide N, 区域: (x1,y1)-(x2,y2)]
    var areaMatch=line.match(/区域:\s*\((-?\d+),(-?\d+)\)-\((-?\d+),(-?\d+)\)/);
    if(areaMatch){
      return{
        type:'area',
        x1:parseInt(areaMatch[1]),
        y1:parseInt(areaMatch[2]),
        x2:parseInt(areaMatch[3]),
        y2:parseInt(areaMatch[4])
      };
    }

    // 解析元素位置: 📍 [Slide N, <tag.class> "text" @ (x,y,w,h)]
    var elemMatch=line.match(/@\s*\((-?\d+),\s*(-?\d+),\s*(\d+),\s*(\d+)\)/);
    if(elemMatch){
      return{
        type:'element',
        x:parseInt(elemMatch[1]),
        y:parseInt(elemMatch[2]),
        w:parseInt(elemMatch[3]),
        h:parseInt(elemMatch[4])
      };
    }
    // 兼容旧格式: @ (x,y)
    var elemMatchOld=line.match(/@\s*\((-?\d+),\s*(-?\d+)\)/);
    if(elemMatchOld){
      return{
        type:'element',
        x:parseInt(elemMatchOld[1]),
        y:parseInt(elemMatchOld[2]),
        w:150,
        h:40
      };
    }

    return null;
  }

  // 解析所有位置信息（返回数组）
  function parseLocations(text){
    var locations=[];
    var lines=text.split('\n');
    for(var i=0;i<lines.length;i++){
      if(!lines[i].startsWith('📍'))break;
      var loc=parseSingleLocation(lines[i]);
      if(loc)locations.push(loc);
    }
    return locations.length>0?locations:null;
  }

  // 保存评论
  function saveComment(){
    var text=textarea.value.trim();
    if(!text)return;

    var slideIdx=state.currentSlide;
    if(!state.comments[slideIdx])state.comments[slideIdx]=[];

    // 解析位置信息（支持多个）
    var location=parseLocations(text);

    var comment={
      id:state.nextId++,
      text:text,
      timestamp:new Date().toISOString(),
      slide:slideIdx+1,
      location:location
    };

    state.comments[slideIdx].push(comment);
    textarea.value='';
    renderComments();
    updateFooter();

    // 显示成功提示
    slideIndicator.textContent='✓ 已保存到 Slide '+(slideIdx+1);
    slideIndicator.classList.add('show');
    setTimeout(function(){slideIndicator.classList.remove('show');},1800);
  }

  // 删除评论
  function deleteComment(slideIdx,commentId){
    if(!state.comments[slideIdx])return;
    state.comments[slideIdx]=state.comments[slideIdx].filter(function(c){return c.id!==commentId;});
    if(state.comments[slideIdx].length===0)delete state.comments[slideIdx];
    renderComments();
    updateFooter();
  }

  // 显示所有高亮框
  function showAllHighlights(slideIdx){
    // 清除旧的高亮框
    highlightBox.innerHTML='';

    var comments=state.comments[slideIdx]||[];
    var slides=document.querySelectorAll('.slide');
    var slideEl=slides[slideIdx];
    if(!slideEl)return;

    var slideRect=slideEl.getBoundingClientRect();

    comments.forEach(function(c){
      if(!c.location)return;

      // location 现在是数组
      var locations=Array.isArray(c.location)?c.location:[c.location];

      locations.forEach(function(loc,idx){
        var x,y,w,h;

        if(loc.type==='area'){
          x=slideRect.left+loc.x1;
          y=slideRect.top+loc.y1;
          w=loc.x2-loc.x1;
          h=loc.y2-loc.y1;
        }else if(loc.type==='element'){
          x=slideRect.left+loc.x;
          y=slideRect.top+loc.y;
          w=loc.w;
          h=loc.h;
        }else{
          return;
        }

        var box=document.createElement('div');
        box.className='__srhlt-box';
        box.setAttribute('data-id','#'+c.id+(locations.length>1?'.'+String.fromCharCode(97+idx):''));
        box.style.left=x+'px';
        box.style.top=y+'px';
        box.style.width=w+'px';
        box.style.height=h+'px';
        highlightBox.appendChild(box);
      });
    });
  }

  // 闪烁特定评论的高亮框
  function flashHighlight(commentId){
    var boxes=highlightBox.querySelectorAll('.__srhlt-box');
    boxes.forEach(function(box){
      if(box.getAttribute('data-id')==='#'+commentId){
        box.classList.remove('flash');
        void box.offsetWidth; // 强制重绘
        box.classList.add('flash');
      }
    });
  }

  // 隐藏所有高亮框
  function hideAllHighlights(){
    highlightBox.innerHTML='';
  }

  // 当前选中的评论
  var selectedCommentEl=null;

  // 清除选中状态
  function clearSelectedComment(){
    if(selectedCommentEl){
      selectedCommentEl.classList.remove('selected');
      selectedCommentEl=null;
    }
    hideAllHighlights();
  }

  // 显示单个评论的高亮
  function showCommentHighlight(comment,slideIdx){
    hideAllHighlights();
    if(!comment.location)return;

    var slides=document.querySelectorAll('.slide');
    var slideEl=slides[slideIdx];
    if(!slideEl)return;

    var slideRect=slideEl.getBoundingClientRect();
    var locations=Array.isArray(comment.location)?comment.location:[comment.location];

    locations.forEach(function(loc,idx){
      var x,y,w,h;

      if(loc.type==='area'){
        x=slideRect.left+loc.x1;
        y=slideRect.top+loc.y1;
        w=loc.x2-loc.x1;
        h=loc.y2-loc.y1;
      }else if(loc.type==='element'){
        x=slideRect.left+loc.x;
        y=slideRect.top+loc.y;
        w=loc.w;
        h=loc.h;
      }else{
        return;
      }

      var box=document.createElement('div');
      box.className='__srhlt-box';
      box.setAttribute('data-id','#'+comment.id+(locations.length>1?'.'+String.fromCharCode(97+idx):''));
      box.style.left=x+'px';
      box.style.top=y+'px';
      box.style.width=w+'px';
      box.style.height=h+'px';
      highlightBox.appendChild(box);
    });
  }

  // 渲染当前页评论
  function renderComments(){
    var slideIdx=state.currentSlide;
    var comments=state.comments[slideIdx]||[];

    // 切换页面时清除高亮
    clearSelectedComment();

    if(comments.length===0){
      list.innerHTML='';
      list.appendChild(empty);
      return;
    }

    list.innerHTML='';
    comments.forEach(function(c){
      var div=document.createElement('div');
      var hasLocation=c.location!==null&&c.location!==undefined;
      div.className='__srcom'+(hasLocation?' clickable':'');
      div.innerHTML='<div class="__srm"><span class="__srn">#'+c.id+'</span><span class="__srs">'+formatTime(c.timestamp)+(hasLocation?' 📍':'')+'</span><button class="__srd" data-slide="'+slideIdx+'" data-id="'+c.id+'" title="删除此评论">✕</button></div><div class="__srtxt">'+esc(c.text)+'</div>';

      // 如果有位置信息，点击时显示高亮并选中评论
      if(hasLocation){
        div.addEventListener('click',function(e){
          if(e.target.classList.contains('__srd'))return;
          e.stopPropagation();
          console.log('Clicked comment',c.id,'on slide',slideIdx);

          // 清除之前的选中
          clearSelectedComment();

          // 选中当前评论
          div.classList.add('selected');
          selectedCommentEl=div;

          // 显示该评论的高亮
          showCommentHighlight(c,slideIdx);
        });
      }

      list.appendChild(div);
    });

    // 绑定删除按钮
    list.querySelectorAll('.__srd').forEach(function(btn){
      btn.addEventListener('click',function(e){
        e.stopPropagation();
        var slide=parseInt(btn.dataset.slide);
        var id=parseInt(btn.dataset.id);
        if(confirm('确定要删除这条评论吗？')){
          deleteComment(slide,id);
        }
      });
    });
  }

  // 更新底部统计
  function updateFooter(){
    var total=0;
    Object.keys(state.comments).forEach(function(k){
      total+=state.comments[k].length;
    });
    countLabel.textContent='总共 '+total+' 条评论';
    exportBtn.disabled=total===0;
  }

  // 导出所有评论为 markdown
  function exportComments(){
    var lines=['# 演示文稿评论报告','',
      '> **导出时间**: '+new Date().toLocaleString('zh-CN'),
      '> **文件**: '+document.title,
      '> **总评论数**: '+Object.keys(state.comments).reduce(function(sum,k){return sum+state.comments[k].length;},0)+' 条',
      '','---',''];

    var slideNumbers=Object.keys(state.comments).map(Number).sort(function(a,b){return a-b;});

    slideNumbers.forEach(function(slideIdx){
      var comments=state.comments[slideIdx];
      var slideTitle='Slide #'+(slideIdx+1);

      // 尝试获取幻灯片标题
      var slides=document.querySelectorAll('.slide');
      if(slides[slideIdx]){
        var h2=slides[slideIdx].querySelector('h2');
        if(h2)slideTitle+=' - '+h2.textContent.trim();
      }

      lines.push('## '+slideTitle,'');
      lines.push('**评论数**: '+comments.length+' 条','');

      comments.forEach(function(c,idx){
        lines.push('### '+(idx+1)+'. 评论 #'+c.id,'');
        lines.push('**时间**: '+new Date(c.timestamp).toLocaleString('zh-CN'),'');
        lines.push('**内容**:','');
        lines.push(c.text,'');
        if(idx<comments.length-1)lines.push('---','');
      });

      lines.push('','---','');
    });

    var blob=new Blob([lines.join('\n')],{type:'text/markdown;charset=utf-8'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;
    a.download='presentation-comments-'+new Date().toISOString().slice(0,10)+'.md';
    a.click();
    URL.revokeObjectURL(url);

    slideIndicator.textContent='✓ 评论已导出';
    slideIndicator.classList.add('show');
    setTimeout(function(){slideIndicator.classList.remove('show');},1800);
  }

  // 工具函数
  function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function formatTime(iso){
    var d=new Date(iso);
    return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
  }

  // 事件绑定
  badge.addEventListener('click',togglePanel);
  closebtn.addEventListener('click',togglePanel);
  saveBtn.addEventListener('click',saveComment);
  clearBtn.addEventListener('click',function(){textarea.value='';});
  exportBtn.addEventListener('click',exportComments);

  // 阻止 textarea 中的按键事件冒泡（防止空格等键触发演示文稿翻页）
  textarea.addEventListener('keydown',function(e){
    e.stopPropagation();
    // Ctrl+Enter 保存评论
    if(e.ctrlKey&&e.key==='Enter'){
      e.preventDefault();
      saveComment();
    }
  });
  textarea.addEventListener('keyup',function(e){
    e.stopPropagation();
  });
  textarea.addEventListener('keypress',function(e){
    e.stopPropagation();
  });

  // 键盘快捷键（在捕获阶段监听，优先于浏览器处理）
  document.addEventListener('keydown',function(e){
    if(e.ctrlKey&&e.key==='r'){
      e.preventDefault();
      togglePanel();
      return false;
    }
    if(e.key==='Escape'&&state.panelOpen){
      togglePanel();
    }
  },true); // true = 捕获阶段

  // ========================================
  // 选区和元素选择功能
  // ========================================

  // 插入位置信息到文本框开头（支持多个位置）
  function insertLocationInfo(info){
    var current=textarea.value;
    // 如果已有位置信息，追加到位置信息区域
    if(current.startsWith('📍')){
      var lines=current.split('\n');
      // 找到第一个非位置信息行
      var insertIdx=0;
      for(var i=0;i<lines.length;i++){
        if(lines[i].startsWith('📍')){
          insertIdx=i+1;
        }else{
          break;
        }
      }
      lines.splice(insertIdx,0,info);
      textarea.value=lines.join('\n');
    }else{
      textarea.value=info+'\n'+current;
    }
    textarea.focus();
  }

  // 获取元素描述
  function getElementDesc(el){
    var tag=el.tagName.toLowerCase();
    var cls=el.className?'.'+el.className.split(' ').filter(function(c){return c&&!c.startsWith('__sr');}).join('.'):'';
    var text=el.textContent||'';
    // 移除换行符和多余空白，防止破坏位置信息解析
    text=text.replace(/[\r\n]+/g,' ').replace(/\s+/g,' ').trim().substring(0,30);
    if(text.length>=30)text+='...';
    return '<'+tag+cls+'>'+(text?' "'+text+'"':'');
  }

  // 获取元素相对于当前幻灯片的位置
  function getElementPosition(el){
    var slides=document.querySelectorAll('.slide');
    var currentSlideEl=slides[state.currentSlide];
    if(!currentSlideEl)return null;

    var slideRect=currentSlideEl.getBoundingClientRect();
    var elRect=el.getBoundingClientRect();

    return{
      x:Math.round(elRect.left-slideRect.left),
      y:Math.round(elRect.top-slideRect.top),
      w:Math.round(elRect.width),
      h:Math.round(elRect.height)
    };
  }

  // 检查元素是否在幻灯片内且不是我们的UI
  function isValidTarget(el){
    if(!el)return false;
    // 排除我们的UI元素
    if(el.id&&el.id.startsWith('__sr'))return false;
    if(el.className&&typeof el.className==='string'&&el.className.includes('__sr'))return false;
    // 检查是否在幻灯片内
    return el.closest('.slide')!==null;
  }

  // 鼠标按下 - 开始选区
  document.addEventListener('mousedown',function(e){
    if(!state.panelOpen)return;
    if(!isValidTarget(e.target))return;
    // 忽略右键
    if(e.button!==0)return;

    selState.dragging=true;
    selState.startX=e.clientX;
    selState.startY=e.clientY;
    selectionBox.style.left=e.clientX+'px';
    selectionBox.style.top=e.clientY+'px';
    selectionBox.style.width='0';
    selectionBox.style.height='0';
  });

  // 鼠标移动 - 更新选区或高亮元素
  document.addEventListener('mousemove',function(e){
    if(!state.panelOpen)return;

    // 如果在拖拽，更新选区框
    if(selState.dragging){
      var x=Math.min(e.clientX,selState.startX);
      var y=Math.min(e.clientY,selState.startY);
      var w=Math.abs(e.clientX-selState.startX);
      var h=Math.abs(e.clientY-selState.startY);

      // 只要有移动(>3px)，就清除 hover 高亮（视觉反馈：进入拖拽模式）
      if((w>3||h>3)&&selState.lastHighlight){
        selState.lastHighlight.classList.remove('__sr-highlight');
        selState.lastHighlight=null;
      }

      // 只有拖动超过5px才显示选区框
      if(w>5||h>5){
        selectionBox.classList.add('active');
        selectionBox.style.left=x+'px';
        selectionBox.style.top=y+'px';
        selectionBox.style.width=w+'px';
        selectionBox.style.height=h+'px';
      }
      return;
    }

    // 否则，高亮悬停的元素
    var el=document.elementFromPoint(e.clientX,e.clientY);
    if(isValidTarget(el)){
      if(selState.lastHighlight&&selState.lastHighlight!==el){
        selState.lastHighlight.classList.remove('__sr-highlight');
      }
      el.classList.add('__sr-highlight');
      selState.lastHighlight=el;
    }else if(selState.lastHighlight){
      selState.lastHighlight.classList.remove('__sr-highlight');
      selState.lastHighlight=null;
    }
  });

  // 鼠标松开 - 完成选区
  document.addEventListener('mouseup',function(e){
    if(!state.panelOpen)return;

    // 清除高亮
    if(selState.lastHighlight){
      selState.lastHighlight.classList.remove('__sr-highlight');
      selState.lastHighlight=null;
    }

    if(selState.dragging){
      selState.dragging=false;
      var w=Math.abs(e.clientX-selState.startX);
      var h=Math.abs(e.clientY-selState.startY);

      // 如果是拖拽选区（超过10px），创建区域选择
      if(w>10||h>10){
        // 计算相对于当前幻灯片的位置
        var slides=document.querySelectorAll('.slide');
        var currentSlideEl=slides[state.currentSlide];
        if(currentSlideEl){
          var slideRect=currentSlideEl.getBoundingClientRect();
          var x1=Math.round(Math.min(selState.startX,e.clientX)-slideRect.left);
          var y1=Math.round(Math.min(selState.startY,e.clientY)-slideRect.top);
          var x2=Math.round(Math.max(selState.startX,e.clientX)-slideRect.left);
          var y2=Math.round(Math.max(selState.startY,e.clientY)-slideRect.top);

          var info='📍 [Slide '+(state.currentSlide+1)+', 区域: ('+x1+','+y1+')-('+x2+','+y2+')]';
          insertLocationInfo(info);
        }
      }
      selectionBox.classList.remove('active');
    }
  });

  // 点击元素 - 选择元素
  document.addEventListener('click',function(e){
    if(!state.panelOpen)return;

    // 如果点击的是侧边栏内的评论，不处理（已在评论点击事件中处理）
    if(e.target.closest('.__srcom')){
      return;
    }

    // 点击其他地方，清除评论选中和高亮
    clearSelectedComment();

    if(!isValidTarget(e.target))return;

    var el=e.target;

    // 跳过太大的 container（宽或高超过 slide 的 60%）
    var slides=document.querySelectorAll('.slide');
    var slideEl=slides[state.currentSlide];
    if(slideEl){
      var slideRect=slideEl.getBoundingClientRect();
      var elRect=el.getBoundingClientRect();
      if(elRect.width>slideRect.width*0.6||elRect.height>slideRect.height*0.6){
        return; // 太大，跳过
      }
    }

    var pos=getElementPosition(el);
    var desc=getElementDesc(el);
    var info='📍 [Slide '+(state.currentSlide+1)+', '+desc;
    if(pos){
      info+=' @ ('+pos.x+','+pos.y+','+pos.w+','+pos.h+')';
    }
    info+=']';
    insertLocationInfo(info);
  });

  // 初始化
  setupSlideDetection();
  renderComments();
  updateFooter();
})();
</script>
